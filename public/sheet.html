<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WDP Sheet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@4/dist/jsuites.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jspreadsheet.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="container sheet-wide">
    <div class="header">
      <div>
        <h1>WDP Sheet</h1>
        <p>Klik <b>Copy Semua</b> lalu paste (Ctrl+V) di Google Sheets — atau block sel manual lalu Ctrl+C.</p>
      </div>
      <div class="nav">
        <a href="/">← Info / API</a>
      </div>
    </div>

    <div class="legend">
      <span>Jumlah = <b>1</b> (order 1x, semua user)</span>
      <span><i class="swatch green"></i> Hasil <b>1</b> = dapat invoice (paling atas)</span>
      <span><i class="swatch red"></i> Hasil <b>limit</b> = user limit (urutan ke-2)</span>
      <span>Zonk = kolom Hasil kosong (paling bawah)</span>
    </div>

    <div class="sheet-toolbar">
      <button id="btnReload" type="button">Muat Ulang</button>
      <button id="btnCopyAll" type="button" class="btn-secondary">Copy Semua</button>
      <span id="copyToast" class="copy-toast"></span>
      <div id="sheetStats" class="sheet-stats"></div>
    </div>

    <div id="spreadsheet"></div>
    <div id="sheetError" class="status err" style="margin-top:12px;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsuites@4/dist/jsuites.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/index.min.js"></script>
  <script>
    let sheetInstance = null;
    let sheetRows = [];

    function rowsToGrid(rows) {
      return rows.map((r) => [
        String(r.user),
        String(r.server),
        String(r.jumlah || '1'),
        String(r.hasil || ''),
        String(r.link_invoice || ''),
      ]);
    }

    function applyRowStyles(instance, rows) {
      for (let y = 0; y < rows.length; y++) {
        const row = rows[y];
        const cell = instance.getCellFromCoords(0, y);
        if (!cell) continue;
        if (row.status === 'limit') {
          cell.style.backgroundColor = '#ff0000';
          cell.style.color = '#ffffff';
          cell.style.fontWeight = '600';
        } else if (row.status === 'sukses') {
          cell.style.backgroundColor = '#ecfdf5';
        } else {
          cell.style.backgroundColor = '';
          cell.style.color = '';
          cell.style.fontWeight = '';
        }
      }
    }

    function buildSheet(rows) {
      const data = rowsToGrid(rows);
      const container = document.getElementById('spreadsheet');
      container.innerHTML = '';

      sheetInstance = jspreadsheet(container, {
        data,
        columns: [
          { type: 'text', title: 'User', width: 160 },
          { type: 'text', title: 'Server', width: 100 },
          { type: 'numeric', title: 'Jumlah', width: 80, readOnly: true },
          { type: 'text', title: 'Hasil', width: 90, readOnly: true },
          { type: 'text', title: 'Invoice', width: 520 },
        ],
        allowInsertRow: false,
        allowInsertColumn: false,
        allowDeleteRow: false,
        allowDeleteColumn: false,
        columnSorting: false,
        tableOverflow: false,
        tableWidth: '100%',
        tableHeight: '78vh',
        copyCompatibility: true,
        updateTable: function(el, cell, x, y) {
          const row = sheetRows[y];
          if (!row || x !== 0) return;
          if (row.status === 'limit') {
            cell.style.backgroundColor = '#ff0000';
            cell.style.color = '#ffffff';
            cell.style.fontWeight = '600';
          } else if (row.status === 'sukses') {
            cell.style.backgroundColor = '#ecfdf5';
          }
        },
      });

      applyRowStyles(sheetInstance, rows);
    }

    function buildTsv(rows) {
      return rows.map((r) => [
        String(r.user),
        String(r.server),
        String(r.jumlah || '1'),
        String(r.hasil || ''),
        String(r.link_invoice || ''),
      ].join('\t')).join('\n');
    }

    function fallbackCopyText(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      ta.style.top = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, text.length);
      let ok = false;
      try {
        ok = document.execCommand('copy');
      } catch (e) {
        ok = false;
      }
      document.body.removeChild(ta);
      return ok;
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (e) {
          return fallbackCopyText(text);
        }
      }
      return fallbackCopyText(text);
    }

    async function copyAllTsv(rows) {
      const toastEl = document.getElementById('copyToast');
      const btn = document.getElementById('btnCopyAll');
      toastEl.textContent = '';

      if (!rows || rows.length === 0) {
        toastEl.textContent = 'Belum ada data.';
        return;
      }

      const tsv = buildTsv(rows);
      const colCount = 5;
      const rowCount = rows.length;
      btn.disabled = true;

      const ok = await copyTextToClipboard(tsv);
      btn.disabled = false;

      if (ok) {
        toastEl.textContent = `${rowCount} baris × ${colCount} kolom disalin — buka Google Sheets lalu Ctrl+V`;
        btn.textContent = 'Tersalin!';
        setTimeout(() => {
          btn.textContent = 'Copy Semua';
          toastEl.textContent = '';
        }, 4000);
      } else {
        toastEl.textContent = 'Gagal copy. Izinkan akses clipboard di browser.';
      }
    }

    async function loadSheet() {
      const errEl = document.getElementById('sheetError');
      const statsEl = document.getElementById('sheetStats');
      errEl.textContent = '';
      statsEl.textContent = 'Memuat...';

      try {
        const res = await fetch('/api/sheet');
        const data = await res.json();
        if (!data.ok) {
          errEl.textContent = data.error || 'Gagal memuat data';
          statsEl.textContent = '';
          document.getElementById('spreadsheet').innerHTML = '';
          return;
        }
        sheetRows = data.rows || [];
        buildSheet(sheetRows);
        const c = data.counts || {};
        statsEl.textContent = `Total: ${data.row_count} | Sukses: ${c.sukses || 0} | Limit: ${c.limit || 0} | Zonk: ${c.zonk || 0}`;
      } catch (err) {
        errEl.textContent = 'Error: ' + err.message;
        statsEl.textContent = '';
      }
    }

    document.getElementById('btnReload').addEventListener('click', loadSheet);
    document.getElementById('btnCopyAll').addEventListener('click', () => copyAllTsv(sheetRows));
    loadSheet();
  </script>
</body>
</html>
